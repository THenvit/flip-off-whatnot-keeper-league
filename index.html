<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flip Off Whatnot - League Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 20px;
}

h1 {
    color: #222;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
}

/* Updated Table Layout Elements */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th {
    background: #1f2937;
    color: white;
    padding: 12px 10px;
    font-weight: 600;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* Explicit Alignment Rules */
.col-team {
    text-align: left;
    width: 50%;
}

.col-record {
    text-align: center;
    width: 25%;
}

.col-pf {
    text-align: right;
    width: 25%;
    font-variant-numeric: tabular-nums; /* Keeps numbers perfectly stacked */
}

tr:hover {
    background-color: #f8fafc;
}

.roster {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
}

.team-card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
}
</style>

</head>

<body>
    
 <div style="margin-bottom:20px;">
    <a href="index.html">Home Page</a> |
    <a href="keepers.html">Keeper Tracker</a> |
    <a href="standings.html">Standings</a> |
    <a href="rules.html">League Rules</a> |
    <a href="team-stat-page.html">Team Rosters</a>
</div>
    
<h1>🏈 Flip Off Whatnot League Dashboard</h1>

<div class="card">
    <table id="standings">
<div class="card">
    <h2>Standings</h2>
    <table id="standings">
        <thead>
            <tr>
                <th class="col-team">Team</th>
                <th class="col-record">Record</th>
                <th class="col-pf">PF</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

        <tbody></tbody>
    </table>
</div>

<div class="card">
    <h2>Rosters</h2>
    <div class="roster" id="rosters"></div>
</div>

<script>

// Global variable loaded dynamically from config.json
let LEAGUE_ID = "";

async function loadLeague() {
    try {
        // 1. Load the central configuration file first
        const configRes = await fetch("config.json");
        const configData = await configRes.json();
        LEAGUE_ID = configData.LEAGUE_ID;

        if (!LEAGUE_ID) {
            throw new Error("LEAGUE_ID missing from config.json");
        }

        // 2. Fetch data assets concurrently (Using local daily player cache file)
        const usersUrl = 'https://api.sleeper.app/v1/league/' + LEAGUE_ID + '/users';
        const rostersUrl = 'https://api.sleeper.app/v1/league/' + LEAGUE_ID + '/rosters';
        const masterPlayersUrl = 'public/players.json'; // Faster execution using your local daily cron asset

        const [usersRes, rostersRes, masterPlayersRes] = await Promise.all([
            fetch(usersUrl),
            fetch(rostersUrl),
            fetch(masterPlayersUrl)
        ]);

        const users = await usersRes.json();
        const rosters = await rostersRes.json();
        const players = await masterPlayersRes.json();

        const ownerMap = {};

        users.forEach(user => {
            ownerMap[user.user_id] =
                user.metadata?.team_name ||
                user.display_name;
        });

        // Safe sorting equation using logical zero default switches
        rosters.sort((a,b) => {
            const scoreA = (a.settings?.fpts || 0) + ((a.settings?.fpts_decimal || 0) / 100);
            const scoreB = (b.settings?.fpts || 0) + ((b.settings?.fpts_decimal || 0) / 100);
            return scoreB - scoreA;
        });

        const standingsBody =
            document.querySelector("#standings tbody");

        standingsBody.innerHTML = "";

        rosters.forEach(team => {
            const basePoints = team.settings?.fpts || 0;
            const decimalPoints = team.settings?.fpts_decimal || 0;
            const points = basePoints + (decimalPoints / 100);
            
            const wins = team.settings?.wins || 0;
            const losses = team.settings?.losses || 0;
            const ownerName = ownerMap[team.owner_id] || "Unknown Team";

            standingsBody.innerHTML += `
                <tr>
                    <td class="col-team"><strong>${ownerName}</strong></td>
                    <td class="col-record">${wins}-${losses}</td>
                    <td class="col-pf"><strong>${points.toFixed(2)}</strong></td>
                </tr>
            `;
        });

        const rosterContainer =
            document.getElementById("rosters");

        rosterContainer.innerHTML = "";

        rosters.forEach(team => {
            const rosterPlayers = team.players || [];
            const ownerName = ownerMap[team.owner_id] || "Unknown Team";

            const playerNames =
                rosterPlayers
                    .slice(0,20)
                    .map(id => players[id]?.full_name || id)
                    .join("<br>");

            rosterContainer.innerHTML += `
                <div class="team-card">
                    <h3>${ownerName}</h3>
                    <p>${playerNames}</p>
                </div>
            `;
        });
    } catch (err) {
        console.error("Failed to parse Sleeper league details:", err);
    }
}

// Boot page execution
loadLeague();
setInterval(loadLeague, 300000);

</script>
</body>
</html>
