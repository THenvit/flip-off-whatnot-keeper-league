<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keeper Tracker</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f6f8;
    margin:20px;
}

h1{
    color:#1f2937;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#111827;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.eligible{
    color:green;
    font-weight:bold;
}

.ineligible{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>🏈 Keeper Tracker</h1>

<table>

<thead>

<tr>
<th>Team</th>
<th>Player</th>
<th>Pos</th>
<th>Draft Round</th>
<th>Times Kept</th>
<th>Next Cost</th>
<th>Status</th>
</tr>

</thead>

<tbody id="keepersBody"></tbody>

</table>

<script>

const LEAGUE_ID =
"1312583156339064832";

async function loadKeepers(){

const [
users,
rosters,
drafts,
players,
keeperHistory

] = await Promise.all([

fetch(
`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`
).then(r=>r.json()),

fetch(
`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`
).then(r=>r.json()),

fetch(
`https://api.sleeper.app/v1/league/${LEAGUE_ID}/drafts`
).then(r=>r.json()),

fetch(
`https://api.sleeper.app/v1/players/nfl`
).then(r=>r.json()),

fetch(
"./keeper-history.json"
).then(r=>r.json())

]);

const draftId =
drafts[0].draft_id;

const picks =
await fetch(
`https://api.sleeper.app/v1/draft/${draftId}/picks`
).then(r=>r.json());

const teamNames = {};

users.forEach(user=>{

teamNames[user.user_id] =
user.metadata?.team_name ||
user.display_name;

});

const draftRounds = {};

picks.forEach(pick=>{

draftRounds[
pick.player_id
] = pick.round;

});

const tbody =
document.getElementById(
"keepersBody"
);

tbody.innerHTML = "";

rosters.forEach(roster=>{

const teamName =
teamNames[
roster.owner_id
];

(roster.players || [])
.forEach(playerId=>{

const player =
players[playerId];

if(!player) return;

const draftRound =
draftRounds[playerId];

const player = players?.[pid];

const round = draftRounds?.[pid] ?? "FA";

const kept = keeperHistory?.[pid]?.times_kept ?? 0;

const eligible = kept < 2;

const nextCost =
  round === "FA"
    ? "Last"
    : round - kept;

const timesKept =
keeperHistory[playerId]
?.times_kept || 0;

const eligible =
timesKept < 2;

const nextCost =
draftRound - timesKept;

tbody.innerHTML += `

<tr>

<td>${teamName}</td>

<td>${player.full_name}</td>

<td>${player.position}</td>

<td>${draftRound}</td>

<td>${timesKept}</td>

<td>
${eligible ? nextCost : "-"}
</td>

<td class="${
eligible
? 'eligible'
: 'ineligible'
}">
${
eligible
? 'Eligible'
: 'Ineligible'
}
</td>

</tr>

`;

});

});

}

loadKeepers();

</script>

</body>
</html>
