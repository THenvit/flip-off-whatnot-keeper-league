<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keeper Tracker</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 20px;
}

h1 {
  color: #111827;
}

.controls {
  margin-bottom: 15px;
}

button {
  padding: 8px 12px;
  margin-right: 10px;
  cursor: pointer;
}

select {
  padding: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #111827;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

.good { color: green; font-weight: bold; }
.bad { color: red; font-weight: bold; }
</style>
</head>

<body>

<div style="margin-bottom:20px;">
    <a href="index.html">Home Page</a> |
    <a href="keepers.html">Keeper Tracker</a> |
    <a href="standings.html">Standings</a>
</div>
  
<h1>🏈 Keeper Tracker</h1>

<div class="controls">

<button onclick="setView('all')">All Teams</button>
<button onclick="setView('single')">Single Team</button>

<select id="teamSelect" style="display:none;"></select>

</div>

<table>
<thead>
<tr>
<th>Team</th>
<th>Player</th>
<th>Pos</th>
<th>Draft Round</th>
<th>Times Kept</th>
<th>Next Cost</th>
<th>Status</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<script>

const LEAGUE_ID = "1312583156339064832";

let globalData = {};
let currentView = "all";

function setView(v){
  currentView = v;
  document.getElementById("teamSelect").style.display =
    v === "single" ? "inline-block" : "none";

  render();
}

document.getElementById("teamSelect")
  .addEventListener("change", render);

async function loadData() {

  const [users, rosters, drafts, players, history] =
    await Promise.all([
      fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/drafts`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()),
      fetch("./keeper-history.json").then(r=>r.json()).catch(()=>({}))
    ]);

  const teamMap = {};
  const teamOptions = [];

  users.forEach(u=>{
    teamMap[u.user_id] = u.metadata?.team_name || u.display_name;
    teamOptions.push({id:u.user_id, name:teamMap[u.user_id]});
  });

  const draftRounds = {};

  // 🔥 IMPORTANT: pull ALL drafts, not just latest
  for (const d of drafts) {

    const picks = await fetch(
      `https://api.sleeper.app/v1/draft/${d.draft_id}/picks`
    ).then(r=>r.json());

    picks.forEach(p=>{
      if(!draftRounds[p.player_id]){
        draftRounds[p.player_id] = p.round;
      }
    });
  }

  globalData = {
    users,
    rosters,
    players,
    history,
    teamMap,
    draftRounds,
    teamOptions
  };

  // populate dropdown
  const sel = document.getElementById("teamSelect");
  sel.innerHTML = "";

  teamOptions.forEach(t=>{
    const opt = document.createElement("option");
    opt.value = t.id;
    opt.textContent = t.name;
    sel.appendChild(opt);
  });

  render();
}

function render(){

  const {
    rosters,
    players,
    history,
    teamMap,
    draftRounds
  } = globalData;

  const tbody = document.getElementById("body");
  tbody.innerHTML = "";

  const selectedTeam =
    document.getElementById("teamSelect").value;

  rosters.forEach(r=>{

    const teamName = teamMap[r.owner_id];

    if(currentView === "single" && r.owner_id !== selectedTeam){
      return;
    }

    (r.players || []).forEach(pid=>{

      const p = players?.[pid];

      const round = draftRounds?.[pid] ?? "FA";
      const kept = history?.[pid]?.times_kept ?? 0;

      const eligible = kept < 2;
      const nextCost = round === "FA"
        ? "FA"
        : Math.max(round - kept, 1);

      tbody.innerHTML += `
        <tr>
          <td>${teamName}</td>
          <td>${p?.full_name || pid}</td>
          <td>${p?.position || "-"}</td>
          <td>${round}</td>
          <td>${kept}</td>
          <td>${eligible ? nextCost : "-"}</td>
          <td class="${eligible ? "good" : "bad"}">
            ${eligible ? "Eligible" : "Ineligible"}
          </td>
        </tr>
      `;

    });

  });

}

loadData();

</script>

</body>
</html>
