<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keeper Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 20px;
}

h1 {
  color: #111827;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #111827;
  color: white;
  padding: 12px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.badge-ok {
  color: green;
  font-weight: bold;
}

.badge-no {
  color: red;
  font-weight: bold;
}

.badge-warn {
  color: #b45309;
  font-weight: bold;
}
</style>
</head>

<body>

<div style="margin-bottom:20px;">
  <a href="index.html">Rules</a> |
  <a href="keepers.html">Keeper Tracker</a> |
  <a href="standings.html">Standings</a>
</div>
        
<h1>🏈 Keeper Tracker</h1>

<table>
  <thead>
    <tr>
      <th>Team</th>
      <th>Player</th>
      <th>Pos</th>
      <th>Draft Round</th>
      <th>Times Kept</th>
      <th>Next Cost</th>
      <th>Status</th>
    </tr>
  </thead>

  <tbody id="body"></tbody>
</table>

<script>

const LEAGUE_ID = "1312583156339064832";

async function load() {

  try {

    const [users, rosters, drafts, players, history] =
      await Promise.all([
        fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r => r.json()),
        fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r => r.json()),
        fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/drafts`).then(r => r.json()),
        fetch(`https://api.sleeper.app/v1/players/nfl`).then(r => r.json()),
        fetch("./keeper-history.json").then(r => r.json()).catch(() => ({}))
      ]);

    const teamMap = {};
    users.forEach(u => {
      teamMap[u.user_id] =
        u.metadata?.team_name || u.display_name;
    });

    const draftId = drafts?.[0]?.draft_id;

    let draftRounds = {};

    if (draftId) {
      const picks = await fetch(
        `https://api.sleeper.app/v1/draft/${draftId}/picks`
      ).then(r => r.json());

      picks.forEach(p => {
        draftRounds[p.player_id] = p.round;
      });
    }

    const tbody = document.getElementById("body");
    tbody.innerHTML = "";

    rosters.forEach(roster => {

      const teamName = teamMap[roster.owner_id] || "Unknown Team";

      const playersList = roster.players || [];

      if (playersList.length === 0) {
        tbody.innerHTML += `
          <tr>
            <td>${teamName}</td>
            <td colspan="6" class="badge-warn">No players found</td>
          </tr>
        `;
        return;
      }

      playersList.forEach(pid => {

        const player = players?.[pid];

        const name = player?.full_name || pid;
        const pos = player?.position || "-";

        const round = draftRounds[pid];

        const kept = history?.[pid]?.times_kept ?? 0;

        const eligible = kept < 2;

        let nextCost;

        if (!round) {
          nextCost = "FA/WW";
        } else {
          nextCost = Math.max(round - kept, 1);
        }

        let status =
          eligible ? "Eligible" : "Ineligible";

        tbody.innerHTML += `
          <tr>
            <td>${teamName}</td>
            <td>${name}</td>
            <td>${pos}</td>
            <td>${round || "FA"}</td>
            <td>${kept}</td>
            <td>${eligible ? nextCost : "-"}</td>
            <td class="${eligible ? "badge-ok" : "badge-no"}">
              ${status}
            </td>
          </tr>
        `;
      });

    });

  } catch (err) {
    console.error(err);

    document.body.innerHTML = `
      <h2 style="color:red;">
        Keeper Tracker failed to load data
      </h2>
      <p>Check console for details.</p>
    `;
  }
}

load();

</script>

</body>
</html>
