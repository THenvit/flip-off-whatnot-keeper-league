<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keeper Tracker</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 20px;
}

h1 {
  color: #111827;
}

.controls {
  margin-bottom: 15px;
}

button {
  padding: 8px 12px;
  margin-right: 8px;
  cursor: pointer;
}

select {
  padding: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #111827;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

.good { color: green; font-weight: bold; }
.bad { color: red; font-weight: bold; }
.rookie { color: #2563eb; font-weight: bold; }
</style>
</head>

<body>
    
 <div style="margin-bottom:20px;">
    <a href="index.html">Home Page</a> |
    <a href="keepers.html">Keeper Tracker</a> |
    <a href="standings.html">Standings</a>
</div>
    
<h1>🏈 Keeper Tracker!</h1>

<div class="controls">
<button onclick="setView('all')">All Teams</button>
<button onclick="setView('single')">Single Team</button>

<select id="teamSelect" style="display:none;"></select>
</div>

<table>
<thead>
<tr>
<th>Team</th>
<th>Player</th>
<th>Pos</th>
<th>Draft Round</th>
<th>Times Kept</th>
<th>Next Cost</th>
<th>Status</th>
<th>Rookie?</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<script>

const LEAGUE_ID = "1312583156339064832";

let state = {};
let view = "all";

function setView(v){
  view = v;
  document.getElementById("teamSelect").style.display =
    v === "single" ? "inline-block" : "none";
  render();
}

document.getElementById("teamSelect")
  .addEventListener("change", render);

async function load() {

  const [users, rosters, drafts, players, history] =
    await Promise.all([
      fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/drafts`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()),
      fetch("./keeper-history.json").then(r=>r.json()).catch(()=>({}))
    ]);

  const teamMap = {};
  const teamOptions = [];

  users.forEach(u=>{
    teamMap[u.user_id] =
      u.metadata?.team_name || u.display_name;

    teamOptions.push({
      id: u.user_id,
      name: teamMap[u.user_id]
    });
  });

  // 🔥 LAST YEAR DRAFT ONLY
  const draftId = drafts?.[0]?.draft_id;

  let draftRounds = {};

  if (draftId) {
    const picks = await fetch(
      `https://api.sleeper.app/v1/draft/${draftId}/picks`
    ).then(r=>r.json());

    picks.forEach(p=>{
      draftRounds[p.player_id] = p.round;
    });
  }

  state = {
    users,
    rosters,
    players,
    history,
    teamMap,
    teamOptions,
    draftRounds
  };

  const sel = document.getElementById("teamSelect");
  sel.innerHTML = "";

  teamOptions.forEach(t=>{
    const opt = document.createElement("option");
    opt.value = t.id;
    opt.textContent = t.name;
    sel.appendChild(opt);
  });

  render();
}

function isRookie(player){
  // Sleeper field: years_exp (approximation)
  if (!player) return false;

  const exp = player.years_exp;

  // rookies typically = 0 or undefined in API
  return exp === 0 || exp === "0";
}

function render(){

  const {
    rosters,
    players,
    history,
    teamMap,
    draftRounds
  } = state;

  const tbody = document.getElementById("body");
  tbody.innerHTML = "";

  const selected = document.getElementById("teamSelect").value;

  rosters.forEach(r=>{

    const team = teamMap[r.owner_id];

    if(view === "single" && r.owner_id !== selected){
      return;
    }

    (r.players || []).forEach(pid=>{

      const p = players?.[pid];

      if (!p) return;

      let round = draftRounds?.[pid];

      const kept = history?.[pid]?.times_kept ?? 0;

      const override = history?.[pid]?.override_round;

      // 🔥 CORE RULE LOGIC
      if (kept > 0 && override) {
        round = override;
      }

      const eligible = kept < 2;

      const nextCost = round
        ? Math.max(round - kept, 1)
        : "FA";

      tbody.innerHTML += `
        <tr>
          <td>${team}</td>
          <td>${p.full_name}</td>
          <td>${p.position}</td>
          <td>${round || "FA"}</td>
          <td>${kept}</td>
          <td>${eligible ? nextCost : "-"}</td>
          <td class="${eligible ? "good" : "bad"}">
            ${eligible ? "Eligible" : "Ineligible"}
          </td>
          <td class="${isRookie(p) ? "rookie" : ""}">
            ${isRookie(p) ? "YES" : ""}
          </td>
        </tr>
      `;
    });

  });

}

load();

</script>

</body>
</html>
