<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keeper Admin Tracker</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 20px;
}

h1 {
  color: #111827;
}

.topbar {
  margin-bottom: 15px;
}

button {
  padding: 8px 12px;
  margin-right: 8px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #111827;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

.good { color: green; font-weight: bold; }
.bad { color: red; font-weight: bold; }
.rookie { color: #2563eb; font-weight: bold; }

.admin {
  display: none;
  margin-top: 10px;
  padding: 10px;
  background: #fff7ed;
  border: 1px solid #fdba74;
}
</style>
</head>

<body>
    
 <div style="margin-bottom:20px;">
    <a href="index.html">Home Page</a> |
    <a href="keepers.html">Keeper Tracker</a> |
    <a href="standings.html">Standings</a>
</div>
    
<h1>🏈 Keeper Tracker (Admin)</h1>

<div class="topbar">

<button onclick="toggleAdmin()">Admin Mode</button>
<button onclick="exportJSON()">Export JSON</button>

</div>

<div id="adminPanel" class="admin">
  <strong>Admin Mode Enabled</strong>
  <p>You can now click "+ Add Keeper" next to players.</p>
</div>

<table>
<thead>
<tr>
<th>Team</th>
<th>Player</th>
<th>Pos</th>
<th>Draft Round</th>
<th>Times Kept</th>
<th>Next Cost</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<script>

const LEAGUE_ID = "1312583156339064832";

let adminMode = false;

// LOCAL keeper store (this replaces JSON until export)
let keeperHistory = {};

function toggleAdmin(){
  adminMode = !adminMode;
  document.getElementById("adminPanel").style.display =
    adminMode ? "block" : "none";

  render();
}

function addKeeper(playerId){

  if(!keeperHistory[playerId]){
    keeperHistory[playerId] = { times_kept: 0 };
  }

  keeperHistory[playerId].times_kept += 1;

  render();
}

function exportJSON(){

  const blob = new Blob(
    [JSON.stringify(keeperHistory, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "keeper-history.json";
  a.click();

  URL.revokeObjectURL(url);
}

let state = {};

async function load(){

  const [users, rosters, drafts, players] =
    await Promise.all([
      fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/drafts`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json())
    ]);

  const teamMap = {};

  users.forEach(u=>{
    teamMap[u.user_id] =
      u.metadata?.team_name || u.display_name;
  });

  const draftId = drafts?.[0]?.draft_id;

  let draftRounds = {};

  if(draftId){
    const picks = await fetch(
      `https://api.sleeper.app/v1/draft/${draftId}/picks`
    ).then(r=>r.json());

    picks.forEach(p=>{
      draftRounds[p.player_id] = p.round;
    });
  }

  state = {
    users,
    rosters,
    players,
    teamMap,
    draftRounds
  };

  render();
}

function render(){

  const {
    rosters,
    players,
    teamMap,
    draftRounds
  } = state;

  const tbody = document.getElementById("body");
  tbody.innerHTML = "";

  rosters.forEach(r=>{

    const team = teamMap[r.owner_id];

    (r.players || []).forEach(pid=>{

      const p = players?.[pid];
      if(!p) return;

      const round = draftRounds?.[pid] ?? "FA";

      const kept = keeperHistory?.[pid]?.times_kept ?? 0;

      const eligible = kept < 2;

      const nextCost = round === "FA"
        ? "FA"
        : Math.max(round - kept, 1);

      tbody.innerHTML += `
        <tr>
          <td>${team}</td>
          <td>${p.full_name}</td>
          <td>${p.position}</td>
          <td>${round}</td>
          <td>${kept}</td>
          <td>${eligible ? nextCost : "-"}</td>
          <td class="${eligible ? "good" : "bad"}">
            ${eligible ? "Eligible" : "Ineligible"}
          </td>
          <td>
            ${
              adminMode
              ? `<button onclick="addKeeper('${pid}')">+ Keeper</button>`
              : ""
            }
          </td>
        </tr>
      `;

    });

  });

}

load();

</script>

</body>
</html>
